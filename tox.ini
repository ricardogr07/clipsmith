[tox]
# Default run covers all validation that needs no live server.
# Use `tox -e web-e2e` separately after starting Next.js: dev.
envlist = lint, type, test, api, web-typecheck, web-build, web-test, web-storybook
requires = tox>=4

# ── Backend validation ─────────────────────────────────────────────────────

[testenv:lint]
skip_install = true
deps = ruff>=0.5
commands = ruff check src tests

[testenv:type]
extras = dev
commands = mypy src/

[testenv:test]
extras = dev,server
commands = pytest tests/ -q -m "not e2e" {posargs}

[testenv:api]
extras = dev,server
commands = pytest tests/api/ -v -m api {posargs}

# ── Frontend validation ────────────────────────────────────────────────────

[testenv:web-install]
skip_install = true
allowlist_externals = pnpm
change_dir = {toxinidir}/web
commands = pnpm install

[testenv:web-typecheck]
skip_install = true
allowlist_externals = pnpm
change_dir = {toxinidir}/web
commands = pnpm exec tsc --noEmit

[testenv:web-build]
skip_install = true
allowlist_externals = pnpm
change_dir = {toxinidir}/web
commands = pnpm build

[testenv:web-test]
skip_install = true
allowlist_externals = pnpm
change_dir = {toxinidir}/web
commands = pnpm cy:comp

[testenv:web-storybook]
skip_install = true
allowlist_externals = pnpm
change_dir = {toxinidir}/web
commands = pnpm storybook:build

# ── E2E (requires `Next.js: dev` running on :3000) ────────────────────────

[testenv:web-e2e]
skip_install = true
allowlist_externals = pnpm
change_dir = {toxinidir}/web
commands = pnpm cy:e2e
