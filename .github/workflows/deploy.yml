name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment (dev | prod)
        default: dev
        type: choice
        options: [dev, prod]

permissions:
  id-token: write   # required for OIDC
  contents: read

env:
  IMAGE_NAME: clipsmith

jobs:
  # ── 1. Build and push image to ACR ──────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_LOGIN_SERVER }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

  # ── 2. Deploy to dev ─────────────────────────────────────────────────────
  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    environment: dev
    env:
      ACI_NAME: ${{ secrets.ACI_NAME_DEV }}
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update container image
        run: |
          IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}"
          cat > /tmp/container.yaml << YAML
          apiVersion: '2021-10-01'
          location: eastus
          name: "$ACI_NAME"
          identity:
            type: UserAssigned
            userAssignedIdentities:
              "${{ secrets.MI_RESOURCE_ID }}": {}
          properties:
            osType: Linux
            restartPolicy: Always
            ipAddress:
              type: Public
              ports:
                - protocol: TCP
                  port: 8000
              dnsNameLabel: clipsmith-api-dev
            imageRegistryCredentials:
              - server: "${{ secrets.ACR_LOGIN_SERVER }}"
                username: "${{ secrets.ACR_USERNAME }}"
                password: "${{ secrets.ACR_PASSWORD }}"
            containers:
              - name: clipsmith-api
                properties:
                  image: "$IMAGE"
                  resources:
                    requests:
                      cpu: 1
                      memoryInGb: 2
                  ports:
                    - port: 8000
                  environmentVariables:
                    - name: CLIPSMITH_API_KEY
                      value: "${{ secrets.CLIPSMITH_API_KEY }}"
                    - name: DATABASE_URL
                      value: "sqlite:////app/data/clipsmith.db"
                    - name: AZURE_SUBSCRIPTION_ID
                      value: "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
                    - name: AZURE_CLIENT_ID
                      value: "${{ secrets.AZURE_CLIENT_ID }}"
                  volumeMounts:
                    - name: data-vol
                      mountPath: /app/data
                    - name: out-vol
                      mountPath: /app/out
            volumes:
              - name: data-vol
                azureFile:
                  shareName: clipsmith-data
                  storageAccountName: "${{ secrets.STORAGE_ACCOUNT_NAME }}"
                  storageAccountKey: "${{ secrets.STORAGE_ACCOUNT_KEY }}"
              - name: out-vol
                azureFile:
                  shareName: clipsmith-out
                  storageAccountName: "${{ secrets.STORAGE_ACCOUNT_NAME }}"
                  storageAccountKey: "${{ secrets.STORAGE_ACCOUNT_KEY }}"
          YAML
          az container create \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --file /tmp/container.yaml \
            --no-wait

      - name: Wait for container to start
        run: |
          for i in $(seq 1 20); do
            STATE=$(az container show \
              --resource-group ${{ secrets.RESOURCE_GROUP }} \
              --name "$ACI_NAME" \
              --query "instanceView.state" -o tsv 2>/dev/null || echo "Unknown")
            echo "State: $STATE (attempt $i/20)"
            [ "$STATE" = "Running" ] && break
            sleep 15
          done

      - name: Get container IP
        id: ip
        run: |
          for i in $(seq 1 10); do
            IP=$(az container show \
              --resource-group ${{ secrets.RESOURCE_GROUP }} \
              --name "$ACI_NAME" \
              --query "ipAddress.ip" -o tsv 2>/dev/null || echo "")
            echo "IP attempt $i: $IP"
            [ -n "$IP" ] && echo "ip=$IP" >> "$GITHUB_OUTPUT" && exit 0
            sleep 10
          done
          echo "::error::Could not retrieve container IP after 100s"
          exit 1

      - name: Print endpoints
        run: |
          echo "IP:   http://${{ steps.ip.outputs.ip }}:8000"
          echo "FQDN: http://clipsmith-api-dev.eastus.azurecontainer.io:8000"

      - name: Health check
        id: health
        run: |
          URL="http://${{ steps.ip.outputs.ip }}:8000/health"
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
            echo "Health: $STATUS (attempt $i/12)"
            [ "$STATUS" = "200" ] && exit 0
            sleep 10
          done
          echo "::error::Health check failed after 120s"
          exit 1

      - name: Rollback on failure
        if: failure() && steps.health.outcome == 'failure'
        run: |
          PREV_IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest"
          echo "Rolling back to $PREV_IMAGE"
          cat > /tmp/container-rollback.yaml << YAML
          apiVersion: '2021-10-01'
          location: eastus
          name: "$ACI_NAME"
          identity:
            type: UserAssigned
            userAssignedIdentities:
              "${{ secrets.MI_RESOURCE_ID }}": {}
          properties:
            osType: Linux
            restartPolicy: Always
            ipAddress:
              type: Public
              ports:
                - protocol: TCP
                  port: 8000
              dnsNameLabel: clipsmith-api-dev
            imageRegistryCredentials:
              - server: "${{ secrets.ACR_LOGIN_SERVER }}"
                username: "${{ secrets.ACR_USERNAME }}"
                password: "${{ secrets.ACR_PASSWORD }}"
            containers:
              - name: clipsmith-api
                properties:
                  image: "$PREV_IMAGE"
                  resources:
                    requests:
                      cpu: 1
                      memoryInGb: 2
                  ports:
                    - port: 8000
                  environmentVariables:
                    - name: CLIPSMITH_API_KEY
                      value: "${{ secrets.CLIPSMITH_API_KEY }}"
                    - name: DATABASE_URL
                      value: "sqlite:////app/data/clipsmith.db"
                    - name: AZURE_SUBSCRIPTION_ID
                      value: "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
                    - name: AZURE_CLIENT_ID
                      value: "${{ secrets.AZURE_CLIENT_ID }}"
                  volumeMounts:
                    - name: data-vol
                      mountPath: /app/data
                    - name: out-vol
                      mountPath: /app/out
            volumes:
              - name: data-vol
                azureFile:
                  shareName: clipsmith-data
                  storageAccountName: "${{ secrets.STORAGE_ACCOUNT_NAME }}"
                  storageAccountKey: "${{ secrets.STORAGE_ACCOUNT_KEY }}"
              - name: out-vol
                azureFile:
                  shareName: clipsmith-out
                  storageAccountName: "${{ secrets.STORAGE_ACCOUNT_NAME }}"
                  storageAccountKey: "${{ secrets.STORAGE_ACCOUNT_KEY }}"
          YAML
          az container create \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --file /tmp/container-rollback.yaml

  # ── 3. Deploy frontend to Vercel ────────────────────────────────────────
  deploy-frontend:
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: dev
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        run: npx vercel --prod --yes --token "${{ secrets.VERCEL_TOKEN }}" --cwd web

  # ── 4. Promote to prod (manual gate) ─────────────────────────────────────
  deploy-prod:
    needs: [deploy-dev, build]
    runs-on: ubuntu-latest
    environment: prod          # GitHub environment with required reviewers set
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
    env:
      ACI_NAME: ${{ secrets.ACI_NAME_PROD }}
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to prod
        run: |
          IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}"
          az container create \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --name "$ACI_NAME" \
            --image "$IMAGE" \
            --registry-login-server "${{ secrets.ACR_LOGIN_SERVER }}" \
            --registry-username "${{ secrets.ACR_USERNAME }}" \
            --registry-password "${{ secrets.ACR_PASSWORD }}" \
            --cpu 2 --memory 4 \
            --ports 8000 \
            --ip-address Public \
            --restart-policy Always \
            --environment-variables \
              CLIPSMITH_API_KEY="${{ secrets.CLIPSMITH_API_KEY }}" \
              DATABASE_URL="${{ secrets.DATABASE_URL_PROD }}"

      - name: Prod health check
        run: |
          IP=$(az container show \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --name "$ACI_NAME" \
            --query "ipAddress.ip" -o tsv)
          curl --retry 6 --retry-delay 10 --retry-connrefused -sf "http://$IP:8000/health"
